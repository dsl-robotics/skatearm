# IK solver per planning group. KDL is the dependency-free default that ships
# with MoveIt; swap in a faster analytic/numeric plugin (e.g. pick_ik or
# trac_ik) on the ROS 2 box if planning-time IK becomes the bottleneck.
# The pure-numpy DLS IK used by the cockpit (tools/skate_commander) is the
# non-ROS reference for the same chains.
left_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
right_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
# both_arms is a multi-chain group (no single-chain IK) — plan it in joint
# space or command the two arms' IK independently.
