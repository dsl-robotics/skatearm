name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hardware-free:
    name: hardware-free unit tests (no MuJoCo, no ROS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install numpy pytest
      - name: Wire protocol, joint map, driver safety and NL parser
        run: >
          pytest -q
          tools/skate_ros2/test/test_protocol_loopback.py
          tools/skate_ros2/test/test_names.py
          tools/skate_ros2/test/test_driver_logic.py
          tools/skate_commander/test/test_nl.py
