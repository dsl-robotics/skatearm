name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hardware-free:
    name: hardware-free unit tests (no MuJoCo, no ROS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install numpy pytest
      - name: Wire protocol, wire + sandbox security, joint map, driver safety, NL parser
        run: >
          pytest -q
          tools/skate_ros2/test/test_protocol_loopback.py
          tools/skate_ros2/test/test_wire_safe.py
          tools/skate_commander/test/test_sandbox.py
          tools/skate_ros2/test/test_names.py
          tools/skate_ros2/test/test_driver_logic.py
          tools/skate_commander/test/test_nl.py

  sim-model:
    name: model-gated tests (MuJoCo guard / planner / IK / URDF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (cockpit + MuJoCo, pinned)
        run: pip install -r tools/skate_commander/requirements.txt "mujoco==3.10.0" pytest
      - name: Fetch the official skt_v3 model
        run: git clone --depth 1 https://github.com/Rbotic/skate_teleop.git
      - name: Build the control + collision models
        run: |
          python sim/make_control_model.py skate_teleop/skt_v3
          python sim/make_collision_model.py skate_teleop/skt_v3
      - name: Collision guard, RRT planner, IK, obstacles, URDF
        env:
          SKT_DIR: skate_teleop/skt_v3
        run: >
          pytest -q
          tools/skate_commander/test/test_guard.py
          tools/skate_commander/test/test_planner.py
          tools/skate_commander/test/test_kinematics.py
          tools/skate_commander/test/test_obstacles.py
          tools/skate_commander/test/test_urdf.py
